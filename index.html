<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>سحب هدايا العيد</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f8f4e8 0%, #f3ead2 100%);
      color: #111;
      padding: 20px;
    }

    .card {
      width: min(92vw, 520px);
      background: rgba(255, 255, 255, 0.96);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 14px 40px rgba(102, 76, 20, 0.14);
      border: 2px solid #d9c28a;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.9rem;
      text-align: center;
      color: #7a5a12;
    }

    p {
      margin: 0 0 18px;
      line-height: 1.7;
      color: #5b4b24;
      text-align: center;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      color: #5b4b24;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      border: 1px solid #d5c08a;
      border-radius: 14px;
      margin-bottom: 12px;
      background: #fffdf7;
    }

    button {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #117a65, #1f9d55);
      color: #fff;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(17, 122, 101, 0.25);
    }

    button:hover {
      transform: translateY(-1px);
    }

    .result {
      margin-top: 18px;
      padding: 18px;
      min-height: 72px;
      border-radius: 16px;
      background: linear-gradient(135deg, #fff8e8, #f7efd9);
      border: 1px solid #e2d1a1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 1.05rem;
      font-weight: 700;
      color: #5a4515;
    }

    .note {
      margin-top: 12px;
      font-size: 13px;
      color: #7a6840;
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎁 سحب هدايا العيد</h1>
    <p>اكتب اسمك لمعرفة الشخص الذي ستقدّم له هدية العيد.</p>

    <label for="nameInput">اسمك</label>
    <input id="nameInput" type="text" placeholder="اكتب اسمك الكامل" autocomplete="off" />
    <button id="submitBtn" type="button">اعرض نتيجتي</button>

    <div class="result" id="result">جاهز ✨</div>
    <div class="note">يمكنك كتابة الاسم الإنجليزي الموجود في القائمة أو الاسم العربي الظاهر لك.</div>
  </div>

  <script>
   const santaAssignments = {
  "JULIA KHAWATER": "AZEEZ ALSUBHI",
  "AZEEZ ALSUBHI": "MOHAMED MANSOUR",
  "MOHAMED MANSOUR": "MMLKH",
  "MMLKH": "BANA WA NAYA",
  "BANA WA NAYA": "FAIZAH KABSH",
  "FAIZAH KABSH": "NABLE AL-ALEM",
  "NABLE AL-ALEM": "JULIA KHAWATER"
};

const displayNames = {
  "JULIA KHAWATER": "خواطر",
  "FAIZAH KABSH": "فايزة",
  "NABLE AL-ALEM": "نبيل",
  "AZEEZ ALSUBHI": "عزيز",
  "BANA WA NAYA": "بانا ونايا",
  "MOHAMED MANSOUR": "محمد",
  "MMLKH": "عبدالرحمن"
};

const nameInput = document.getElementById("nameInput");
const result = document.getElementById("result");
const submitBtn = document.getElementById("submitBtn");

function normalizeEnglishName(value){
  return value.trim().replace(/\s+/g," ").toUpperCase();
}

function showAssignment(){

  const rawValue = nameInput.value;

  if(!rawValue.trim()){
    result.textContent = "الرجاء كتابة اسمك.";
    return;
  }

  const key = normalizeEnglishName(rawValue);

  if(!santaAssignments[key]){
    result.textContent = "الاسم غير موجود في القائمة.";
    return;
  }

  const giverDisplay = displayNames[key];
  const giftedKey = santaAssignments[key];
  const giftedDisplay = displayNames[giftedKey];

  result.textContent =
    `يا ${giverDisplay}، هديتك هذا العيد ستكون لـ ${giftedDisplay} ✨`;
}

submitBtn.addEventListener("click", showAssignment);

nameInput.addEventListener("keydown", function(event){
  if(event.key === "Enter"){
    showAssignment();
  }
});
  </script>
</body>
</html>

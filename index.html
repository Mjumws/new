<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>سحب هدايا العيد</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f8f4e8 0%, #f3ead2 100%);
      color: #111;
    }

    .card {
      width: min(92vw, 520px);
      background: rgba(255,255,255,0.96);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 14px 40px rgba(102, 76, 20, 0.14);
      border: 2px solid #d9c28a;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.9rem;
    }

    p {
      margin: 0 0 18px;
      line-height: 1.5;
      color: #444;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 12px;
      margin-bottom: 12px;
    }

    button {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #117a65, #1f9d55);
      color: #fff;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(17, 122, 101, 0.25);
    }

    .result {
      margin-top: 18px;
      padding: 18px;
      min-height: 72px;
      border-radius: 16px;
      background: linear-gradient(135deg, #fff8e8, #f7efd9);
      border: 1px solid #e2d1a1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 1.05rem;
      font-weight: 700;
      color: #5a4515;
    }

    .note {
      margin-top: 12px;
      font-size: 13px;
      color: #7a6840;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎁 سحب هدايا العيد</h1>
    <p>اكتب اسمك لمعرفة الشخص الذي ستقدّم له هدية العيد.</p>

    <label for="nameInput">اسمك</label>
    <input id="nameInput" type="text" placeholder="اكتب اسمك الكامل" autocomplete="off" />
    <button id="submitBtn"> اعرض اسم الشخص اللي بعايده </button>

    <div class="result" id="result">جاهز ✨</div>
    <div id="loading" style="display:none;text-align:center;margin-top:10px;font-size:26px;">⏳</div>
    <div class="note">استخدم اسمك الكامل كما هو مكتوب في القائمة.</div>
  </div>

  <script>
    // Preset random assignment using numbers 1 to 5.
    // Number map:
    // 1 = C, 2 = E, 3 = A, 4 = D, 5 = B
    // So each person gets one unique target.
    const santaAssignments = {
      "JULIA KHAWATER": "FAIZAH KABSH",
      "FAIZAH KABSH": "MOHAMED",
      "MOHAMED": "BANA WA NAYA",
      "BANA WA NAYA": "AZEEZ ALSUBHI",
      "AZEEZ ALSUBHI": "NABLE AL-ALEM",
      "NABLE AL-ALEM": "JULIA KHAWATER"
    };

    // direct mapping now handled in santaAssignments

    const nameInput = document.getElementById('nameInput');
    const result = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    function normalizeName(value) {
      return value.trim().toUpperCase();
    }

    function showAssignment() {
      const name = normalizeName(nameInput.value);

      if (!name) {
        result.textContent = 'الرجاء كتابة اسمك.';
        return;
      }

      if (!santaAssignments[name]) {
        result.textContent = 'الاسم غير موجود في القائمة. تأكد من كتابة الاسم كما تمت مشاركته معك.';
        return;
      }

      // show loading
      const loading = document.getElementById('loading');
      loading.style.display = 'block';
      result.textContent = '';

      setTimeout(() => {
        loading.style.display = 'none';
        const giftedPerson = santaAssignments[name];
        result.textContent = `يا ${name}، هديتك هذا العيد ستكون لـ ${giftedPerson} ✨`;
      }, 2000);
    }

      if (!santaAssignments[name]) {
        result.textContent = 'الاسم غير موجود في القائمة. تأكد من كتابة الاسم كما تمت مشاركته معك.';
        return;
      }

      const giftedPerson = santaAssignments[name];

      result.textContent = `هلا يا ${name}، هديتك هذا العيد ستكون لـ ${giftedPerson} ✨`;
    }

    submitBtn.addEventListener('click', showAssignment);
    nameInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        showAssignment();
      }
    });
  </script>
</body>
</html>
